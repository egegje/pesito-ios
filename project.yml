name: pesito
options:
  bundleIdPrefix: je.eg.pesito
  deploymentTarget:
    iOS: '17.0'
  developmentLanguage: es-MX
settings:
  base:
    DEVELOPMENT_TEAM: ''
    SWIFT_VERSION: '5.10'
    MARKETING_VERSION: '0.1.0'
    CURRENT_PROJECT_VERSION: '1'
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  pesito:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: pesito
        CFBundleName: pesito
        CFBundleDevelopmentRegion: es-MX
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: NO
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: NO
          NSExceptionDomains:
            gaz.eg.je:
              NSIncludesSubdomains: YES
              NSTemporaryExceptionAllowsInsecureHTTPLoads: NO
        NSCameraUsageDescription: Necesitamos la cámara para tomar foto de tu INE y selfie como parte de la verificación de identidad.
        NSPhotoLibraryUsageDescription: Para adjuntar fotos de tu INE desde la galería.
        NSFaceIDUsageDescription: Usamos Face ID para iniciar sesión sin volver a teclear el código SMS.
        ITSAppUsesNonExemptEncryption: NO
        CFBundleURLTypes:
          - CFBundleURLName: je.eg.pesito
            CFBundleURLSchemes: [pesito]
